<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A5B4FC"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Database cylinder (bottom half) -->
  <ellipse cx="256" cy="340" rx="130" ry="36" fill="#312E81" opacity="0.4"/>
  <rect x="126" y="290" width="260" height="50" fill="#312E81" opacity="0.3"/>
  <ellipse cx="256" cy="290" rx="130" ry="36" fill="#312E81" opacity="0.4"/>
  <ellipse cx="256" cy="290" rx="130" ry="36" stroke="#E0E7FF" stroke-width="5" fill="none" opacity="0.6"/>
  <line x1="126" y1="290" x2="126" y2="340" stroke="#E0E7FF" stroke-width="5" opacity="0.6"/>
  <line x1="386" y1="290" x2="386" y2="340" stroke="#E0E7FF" stroke-width="5" opacity="0.6"/>
  <path d="M126 340 Q126 376 256 376 Q386 376 386 340" stroke="#E0E7FF" stroke-width="5" fill="none" opacity="0.6"/>

  <!-- Bar chart (rising bars) -->
  <rect x="166" y="220" width="40" height="70" rx="6" fill="url(#bar1)"/>
  <rect x="226" y="175" width="40" height="115" rx="6" fill="url(#bar2)"/>
  <rect x="286" y="130" width="40" height="160" rx="6" fill="url(#bar3)"/>

  <!-- Trend arrow going up -->
  <polyline points="176,200 246,155 316,110" stroke="#FDE68A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="316,110 298,118 308,128" fill="#FDE68A"/>

  <!-- Small sparkle / AI dot -->
  <circle cx="346" cy="110" r="14" fill="#FDE68A" opacity="0.9"/>
  <circle cx="346" cy="110" r="7" fill="#FFFBEB"/>
</svg>
